name: JESFormer_LLRetina
model_type: ImageEnhancementModel
scale: 1
num_gpu: 1
manual_seed: 33

datasets:
  train:
    name: TrainSet
    type: Dataset_DualPairedImage
    dataroot_denoise_gt: ~
    dataroot_segment_gt: ~
    dataroot_lq: ~
    geometric_augs: true
    transform: random_crop
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 2
    # Staged training schedule:
    # - `iters` gives the number of iterations for each stage.
    # - `mini_batch_sizes` and `gt_sizes` must have the same number of stages.
    # - With a single stage, these lists can all have length 1.
    mini_batch_sizes: [2]
    iters: [123000]
    gt_size: 512
    gt_sizes: [512]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_DualPairedImage
    dataroot_denoise_gt: ~
    dataroot_segment_gt: ~
    dataroot_lq: ~
    io_backend:
      type: disk

network_g:
  in_channels: 3
  denoise_channels: 3
  segment_channels: 1
  n_feat: 40
  level: 3
  num_blocks: [1, 2, 2, 2]

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 123000
  warmup_iter: 5000
  use_grad_clip: true
  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 123000
    eta_min: 1.0e-6
  mixing_augs:
    mixup: true
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: Adam
    lr: !!float 2e-4
    betas: [0.9, 0.999]
  loss_opt:
    denoise:
      CharbonnierLoss:
        loss_weight: 1
        window_size:
        reduction: mean
        eps: !!float 1e-3
      EdgeLoss:
        loss_weight: 50
        reduction: mean
      PerceptualLoss:
        loss_weight: 0.05
        perceptual_weight: 1
        style_weight: 0.
        criterion: l1
    segment:
      BCEFocalWithLogitsLoss:
        loss_weight: 2
        reduction: mean

val:
  val_freq: 12300
  save_img: true
  rgb2bgr: true
  use_image: true
  max_minibatch: 1
  segment_threshold: 0.5
  save_plot: true
  metrics:
    denoise:
      psnr:
        type: calculate_psnr
        crop_border: 0
        test_y_channel: false
      ssim:
        type: calculate_ssim
        crop_border: 0
        test_y_channel: false
      lpips:
        type: calculate_lpips
        func_net: vgg
    segment:
      accuracy:
        type: calculate_accuracy
      precision:
        type: calculate_precision
      recall:
        type: calculate_recall

logger:
  print_freq: 1230
  save_checkpoint_freq: 12300
  use_tb_logger: true
